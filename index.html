<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ponto Eletrônico</title>
</head>
<body>
    <h1>Relógio: <span id="relogio">00:00:00</span></h1>
    <button onclick="registrar('entrada')">Entrada</button>
    <button onclick="registrar('almocoSaida')">Saída Almoço</button>
    <button onclick="registrar('almocoRetorno')">Retorno Almoço</button>
    <button onclick="registrar('saida')">Saída</button>
    <button onclick="limparTudo()" style="color:red;">Limpar Tudo</button>

    <div style="margin-top:20px;">
        <label for="filtroMes">Filtrar por mês:</label>
        <select id="filtroMes" onchange="renderizarTabela()">
            <option value="todos">Todos os meses</option>
        </select>
    </div>

    <table border="1" style="margin-top:10px; width:100%;">
        <thead>
            <tr>
                <th>Data</th>
                <th>Entrada</th>
                <th>Saída Almoço</th>
                <th>Retorno Almoço</th>
                <th>Saída</th>
                <th>Saldo (vs 8h)</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        const SENHA = "123456";
        
        // Relógio
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

        function carregarPontos() {
            return JSON.parse(localStorage.getItem('pontos2026') || '{}');
        }

        function atualizarFiltros() {
            const select = document.getElementById('filtroMes');
            const pontos = carregarPontos();
            const datas = Object.keys(pontos);
            
            // Extrai meses únicos do formato DD/MM/AAAA
            const meses = new Set();
            datas.forEach(data => {
                const partes = data.split('/');
                if (partes.length === 3) {
                    meses.add(partes[1] + '/' + partes[2]);
                }
            });

            // Mantém a seleção atual se possível
            const valorAtual = select.value;
            select.innerHTML = '<option value="todos">Todos os meses</option>';
            
            Array.from(meses).sort((a, b) => {
                const [m1, a1] = a.split('/');
                const [m2, a2] = b.split('/');
                return a1 - a2 || m1 - m2;
            }).forEach(mes => {
                const option = document.createElement('option');
                option.value = mes;
                option.textContent = mes;
                select.appendChild(option);
            });
            
            select.value = valorAtual;
        }

        function renderizarTabela() {
            const corpo = document.getElementById('corpoTabela');
            const filtro = document.getElementById('filtroMes').value;
            const pontos = carregarPontos();
            corpo.innerHTML = '';

            Object.keys(pontos).sort().forEach(data => {
                const partes = data.split('/');
                const mesData = partes[1] + '/' + partes[2];

                if (filtro !== "todos" && mesData !== filtro) return;

                const p = pontos[data];
                const paraMin = (t) => t === '-' ? 0 : (t.split(':')[0] * 60) + parseInt(t.split(':')[1]);
                
                const totalDia = (paraMin(p.almocoSaida) - paraMin(p.entrada)) + (paraMin(p.saida) - paraMin(p.almocoRetorno));
                const saldo = (totalDia > 0 ? totalDia : 0) - 480;

                corpo.innerHTML += `<tr>
                    <td>${data}</td>
                    <td onclick="interagir('${data}', 'entrada')" style="cursor:pointer; color:blue;">${p.entrada}</td>
                    <td onclick="interagir('${data}', 'almocoSaida')" style="cursor:pointer; color:blue;">${p.almocoSaida}</td>
                    <td onclick="interagir('${data}', 'almocoRetorno')" style="cursor:pointer; color:blue;">${p.almocoRetorno}</td>
                    <td onclick="interagir('${data}', 'saida')" style="cursor:pointer; color:blue;">${p.saida}</td>
                    <td style="color:${saldo >= 0 ? 'green' : 'red'}; font-weight:bold;">
                        ${totalDia > 0 ? (saldo >= 0 ? '+' : '') + Math.floor(Math.abs(saldo)/60) + 'h ' + (Math.abs(saldo)%60) + 'm' : '-'}
                    </td>
                </tr>`;
            });
        }

        function registrar(tipo) {
            const hoje = new Date();
            const dataKey = hoje.toLocaleDateString();
            let pontos = carregarPontos();
            if (!pontos[dataKey]) pontos[dataKey] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' };
            pontos[dataKey][tipo] = hoje.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            atualizarFiltros();
            renderizarTabela();
        }

        function interagir(data, tipo) {
            if (prompt("Senha:") !== SENHA) return;
            const acao = prompt("Deseja [E]ditar ou [X]cluir?", "E");
            let pontos = carregarPontos();
            if (acao?.toUpperCase() === 'X') pontos[data][tipo] = '-';
            else if (acao?.toUpperCase() === 'E') pontos[data][tipo] = prompt("Novo horário (HH:MM):", pontos[data][tipo]);
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            renderizarTabela();
        }

        function limparTudo() { if (prompt("Senha:") === SENHA) { localStorage.removeItem('pontos2026'); atualizarFiltros(); renderizarTabela(); } }

        // Inicialização
        atualizarFiltros();
        renderizarTabela();
    </script>
</body>
</html>
