<script>
    const SENHA = "123456";

    // Garante que o relógio exista no HTML
    setInterval(() => {
        const relogio = document.getElementById('relogio');
        if(relogio) relogio.innerText = new Date().toLocaleTimeString();
    }, 1000);

    function registrar(tipo) {
        const hoje = new Date();
        const dataKey = hoje.toLocaleDateString();
        let pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
        
        if (!pontos[dataKey]) {
            pontos[dataKey] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' };
        }
        
        pontos[dataKey][tipo] = hoje.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        localStorage.setItem('pontos2026', JSON.stringify(pontos));
        renderizarTabela();
    }

    function renderizarTabela() {
        const corpo = document.getElementById('corpoTabela');
        if (!corpo) return;
        corpo.innerHTML = '';
        
        const pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
        
        Object.keys(pontos).sort().forEach(data => {
            const p = pontos[data];
            corpo.innerHTML += `<tr>
                <td>${data}</td>
                <td>${p.entrada}</td>
                <td>${p.almocoSaida}</td>
                <td>${p.almocoRetorno}</td>
                <td>${p.saida}</td>
            </tr>`;
        });
    }

    // Carrega a tabela assim que abrir
    renderizarTabela();
</script>
