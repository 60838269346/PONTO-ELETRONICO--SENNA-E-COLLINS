<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ponto Eletrônico</title>
</head>
<body>
    <h1>Relógio: <span id="relogio">00:00:00</span></h1>
    <button onclick="registrar('entrada')">Entrada</button>
    <button onclick="registrar('almocoSaida')">Saída Almoço</button>
    <button onclick="registrar('almocoRetorno')">Retorno Almoço</button>
    <button onclick="registrar('saida')">Saída</button>
    <button onclick="limparTudo()" style="color:red;">Limpar Tudo</button>

    <table border="1" style="margin-top:20px; width:100%;">
        <thead>
            <tr>
                <th>Data</th>
                <th>Entrada</th>
                <th>Saída Almoço</th>
                <th>Retorno Almoço</th>
                <th>Saída</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        const SENHA = "123456";
        setInterval(() => {document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);

        function registrar(tipo) {
            const hoje = new Date();
            const dataKey = hoje.toLocaleDateString();
            let pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            if (!pontos[dataKey]) { pontos[dataKey] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' }; }
            pontos[dataKey][tipo] = hoje.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            renderizarTabela();
        }

        function renderizarTabela() {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            const pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            Object.keys(pontos).sort().forEach(data => {
                const p = pontos[data];
                corpo.innerHTML += `<tr>
                    <td>${data}</td>
                    <td onclick="interagir('${data}', 'entrada')" style="cursor:pointer; color:blue;">${p.entrada}</td>
                    <td onclick="interagir('${data}', 'almocoSaida')" style="cursor:pointer; color:blue;">${p.almocoSaida}</td>
                    <td onclick="interagir('${data}', 'almocoRetorno')" style="cursor:pointer; color:blue;">${p.almocoRetorno}</td>
                    <td onclick="interagir('${data}', 'saida')" style="cursor:pointer; color:blue;">${p.saida}</td>
                </tr>`;
            });
        }
function interagir(data, tipo) {
            const pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            
            // Verifica a senha ANTES de permitir qualquer ação
            const senhaDigitada = prompt("Digite a senha para alterar este registro:");
            if (senhaDigitada !== SENHA) {
                alert("Senha incorreta!");
                return; // Para a execução aqui se a senha estiver errada
            }

            const acao = prompt("Deseja [E]ditar ou [X]cluir?", "E");
            if (acao && acao.toUpperCase() === 'X') {
                if (confirm("Confirmar exclusão?")) {
                    pontos[data][tipo] = '-';
                    localStorage.setItem('pontos2026', JSON.stringify(pontos));
                    renderizarTabela();
                }
            } else if (acao && acao.toUpperCase() === 'E') {
                const novo = prompt("Novo horário (HH:MM):", pontos[data][tipo]);
                if (novo) {
                    pontos[data][tipo] = novo;
                    localStorage.setItem('pontos2026', JSON.stringify(pontos));
                    renderizarTabela();
                }
            }
        }

        function limparTudo() {
            if (prompt("Senha para apagar:") === SENHA) {
                localStorage.removeItem('pontos2026');
                renderizarTabela();
            }
        }
        renderizarTabela();
        function renderizarTabela() {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            const pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            let totalMensalMinutos = 0;

            Object.keys(pontos).sort().forEach(data => {
                const p = pontos[data];
                
                // Função para converter HH:MM em minutos
                const paraMinutos = (timeStr) => {
                    if (timeStr === '-') return 0;
                    const [h, m] = timeStr.split(':').map(Number);
                    return h * 60 + m;
                };

                const manha = paraMinutos(p.almocoSaida) - paraMinutos(p.entrada);
                const tarde = paraMinutos(p.saida) - paraMinutos(p.almocoRetorno);
                const totalDia = (manha > 0 ? manha : 0) + (tarde > 0 ? tarde : 0);
                totalMensalMinutos += totalDia;
                const horasDia = Math.floor(totalDia / 60);
                const minDia = totalDia % 60;

                corpo.innerHTML += `<tr>
                    <td>${data}</td>
                    <td onclick="interagir('${data}', 'entrada')" style="cursor:pointer; color:blue;">${p.entrada}</td>
                    <td onclick="interagir('${data}', 'almocoSaida')" style="cursor:pointer; color:blue;">${p.almocoSaida}</td>
                    <td onclick="interagir('${data}', 'almocoRetorno')" style="cursor:pointer; color:blue;">${p.almocoRetorno}</td>
                    <td onclick="interagir('${data}', 'saida')" style="cursor:pointer; color:blue;">${p.saida}</td>
                    <td>${totalDia > 0 ? horasDia + 'h ' + minDia + 'm' : '-'}</td>
                </tr>`;
            });

            const totalH = Math.floor(totalMensalMinutos / 60);
            const totalM = totalMensalMinutos % 60;
            corpo.innerHTML += `<tr>
                <td colspan="5" style="text-align:right; font-weight:bold;">TOTAL MENSAL:</td>
                <td style="font-weight:bold; color:green;">${totalH}h ${totalM}m</td>
            </tr>`;
        }
    </script>
</body>
</html>
