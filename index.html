<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        select { padding: 10px; margin: 10px 0; width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ponto 2026</h1>
    <h2 id="relogio">00:00:00</h2>
    <p><strong>Colaborador:</strong> Jonh Henrique Sena da Silva</p>
    
    <select id="mesSelect" onchange="carregarDados()">
        <option value="0">Janeiro</option><option value="1">Fevereiro</option>
        <option value="2">Março</option><option value="3">Abril</option>
        <option value="4">Maio</option><option value="5">Junho</option>
        <option value="6">Julho</option><option value="7">Agosto</option>
        <option value="8">Setembro</option><option value="9">Outubro</option>
        <option value="10">Novembro</option><option value="11">Dezembro</option>
    </select>

    <button onclick="registrarPonto()">Registrar Ponto</button>

    <table id="tabelaPonto">
        <thead><tr><th>Data/Hora</th></tr></thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);

    function registrarPonto() {
        const nome = "Jonh Henrique Sena da Silva";
        const data = new Date();
        const registro = data.toLocaleString();
        let pontos = JSON.parse(localStorage.getItem('pontos2026') || '[]');
        pontos.push({ nome: nome, data: data, texto: registro });
        localStorage.setItem('pontos2026', JSON.stringify(pontos));
        carregarDados();
    }

    function carregarDados() {
        const mesEscolhido = document.getElementById('mesSelect').value;
        const pontos = JSON.parse(localStorage.getItem('pontos2026') || '[]');
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        
        pontos.filter(p => new Date(p.data).getMonth() == mesEscolhido).forEach(p => {
            corpo.innerHTML += `<tr><td>${p.texto}</td></tr>`;
        });
    }
    carregarDados();
</script>
</body>
</html>
