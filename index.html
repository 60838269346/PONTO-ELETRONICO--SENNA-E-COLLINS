<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ponto Eletrônico 44h</title>
</head>
<body>
    <h1>Colaborador: Jonh Henrique Sena da Silva</h1>
    <h1>Relógio: <span id="relogio">00:00:00</span></h1>
    
    <button onclick="registrar('entrada')">Entrada</button>
    <button onclick="registrar('almocoSaida')">Saída Almoço</button>
    <button onclick="registrar('almocoRetorno')">Retorno Almoço</button>
    <button onclick="registrar('saida')">Saída</button>
    <button onclick="adicionarRetroativo()" style="background-color: yellow;">Incluir Retroativo</button>
    <button onclick="limparTudo()" style="color:red;">Limpar Tudo</button>

    <div style="margin-top:20px;">
        <label for="filtroMes">Filtrar por mês:</label>
        <select id="filtroMes" onchange="renderizarTabela()">
            <option value="todos">Todos os meses</option>
            <option value="01/2026">01/2026</option>
            <option value="02/2026">02/2026</option>
            <option value="03/2026">03/2026</option>
            <option value="04/2026">04/2026</option>
            <option value="05/2026">05/2026</option>
            <option value="06/2026">06/2026</option>
            <option value="07/2026">07/2026</option>
            <option value="08/2026">08/2026</option>
            <option value="09/2026">09/2026</option>
            <option value="10/2026">10/2026</option>
            <option value="11/2026">11/2026</option>
            <option value="12/2026">12/2026</option>
        </select>
    </div>

    <table border="1" style="margin-top:10px; width:100%;">
        <thead>
            <tr>
                <th>Data</th>
                <th>Entrada</th>
                <th>Saída Almoço</th>
                <th>Retorno Almoço</th>
                <th>Saída</th>
                <th>Status do Dia</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        const SENHA = "123456";
        const JORNADA_FIM = 16 * 60 + 20; 

        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function carregarPontos() {
            return JSON.parse(localStorage.getItem('pontos2026') || '{}');
        }

        function adicionarRetroativo() {
            if (prompt("Senha:") !== SENHA) return;
            const data = prompt("Digite a data (dd/mm/aaaa):");
            if (!data) return;

            let pontos = carregarPontos();
            if (!pontos[data]) {
                pontos[data] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' };
                localStorage.setItem('pontos2026', JSON.stringify(pontos));
                renderizarTabela();
            } else {
                alert("Essa data já existe! Edite clicando no horário da tabela.");
            }
        }

        function renderizarTabela() {
            const corpo = document.getElementById('corpoTabela');
            const filtro = document.getElementById('filtroMes').value;
            const pontos = carregarPontos();
            corpo.innerHTML = '';
            let saldoMensal = 0;

            Object.keys(pontos).sort().forEach(data => {
                const partes = data.split('/');
                const mesData = partes[1] + '/' + partes[2];
                if (filtro !== "todos" && mesData !== filtro) return;
                
                const p = pontos[data];
                const paraMin = (t) => t === '-' ? 0 : (parseInt(t.split(':')[0]) * 60) + parseInt(t.split(':')[1]);
                const saidaMin = paraMin(p.saida);
                const diaSemana = new Date(data.split('/').reverse().join('-')).getDay();
                
                let status = "-";
                let cor = "black";
                
                if (diaSemana === 0) {
                    status = "Folga";
                } else if (saidaMin > 0) {
                    const extra = saidaMin - JORNADA_FIM;
                    saldoMensal += extra;
                    if (extra > 0) {
                        status = "Extra: " + Math.floor(extra/60) + "h " + (extra%60) + "m";
                        cor = "blue";
                    } else if (extra < 0) {
                        status = "Falta: " + Math.floor(Math.abs(extra)/60) + "h " + (Math.abs(extra)%60) + "m";
                        cor = "red";
                    } else {
                        status = "No horário";
                        cor = "green";
                    }
                }

                corpo.innerHTML += `<tr> <td>${data}</td> <td onclick="interagir('${data}', 'entrada')" style="cursor:pointer; color:blue;">${p.entrada}</td> <td onclick="interagir('${data}', 'almocoSaida')" style="cursor:pointer; color:blue;">${p.almocoSaida}</td> <td onclick="interagir('${data}', 'almocoRetorno')" style="cursor:pointer; color:blue;">${p.almocoRetorno}</td> <td onclick="interagir('${data}', 'saida')" style="cursor:pointer; color:blue;">${p.saida}</td> <td style="color:${cor}; font-weight:bold;">${status}</td> </tr>`;
            });

            const sinal = saldoMensal >= 0 ? '+' : '';
            corpo.innerHTML += `<tr style="background-color: #f0f0f0;"> <td colspan="5" style="text-align:right; font-weight:bold;">Saldo Acumulado do Mês:</td> <td style="color:${saldoMensal >= 0 ? 'blue' : 'red'}; font-weight:bold;"> ${sinal}${Math.floor(Math.abs(saldoMensal)/60)}h ${Math.abs(saldoMensal)%60}m </td> </tr>`;
        }

        function registrar(tipo) {
            const hoje = new Date();
            const dataKey = hoje.toLocaleDateString();
            let pontos = carregarPontos();
            if (!pontos[dataKey]) pontos[dataKey] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' };
            pontos[dataKey][tipo] = hoje.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            renderizarTabela();
        }

        function interagir(data, tipo) {
            if (prompt("Senha:") !== SENHA) return;
            const acao = prompt("Deseja [E]ditar ou [X]cluir?", "E");
            let pontos = carregarPontos();
            if (acao?.toUpperCase() === 'X') pontos[data][tipo] = '-';
            else if (acao?.toUpperCase() === 'E') pontos[data][tipo] = prompt("Novo horário (HH:MM):", pontos[data][tipo]);
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            renderizarTabela();
        }

        function limparTudo() {
            if (prompt("Senha:") === SENHA) {
                localStorage.removeItem('pontos2026');
                renderizarTabela();
            }
        }

        renderizarTabela();
    </script>
</body>
</html>
