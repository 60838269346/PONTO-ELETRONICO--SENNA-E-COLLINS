<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ponto Eletrônico</title>
    <style>
      <style>
    /* Estilo Geral */
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f4f7f6; 
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 { color: #2c3e50; }

    /* Relógio em destaque */
    #relogio { 
        font-size: 2.5rem; 
        font-weight: bold; 
        color: #3498db;
        margin: 10px 0;
    }

    /* Seletor de mês */
    #mesSelect {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 1rem;
        margin-bottom: 20px;
    }

    /* Botões */
    .btn { 
        padding: 12px 20px; 
        margin: 5px; 
        cursor: pointer; 
        border: none;
        border-radius: 5px;
        background-color: #27ae60;
        color: white;
        font-weight: bold;
        transition: background 0.3s;
    }
    .btn:hover { background-color: #219150; }

    /* Tabela Estilizada */
    table { 
        width: 90%; 
        max-width: 800px;
        border-collapse: separate; 
        border-spacing: 0;
        margin-top: 20px; 
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    th { background-color: #34495e; color: white; padding: 15px; }
    td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; }
    
    /* Efeito de edição */
    td:not(:first-child) { cursor: pointer; transition: background 0.2s; }
    td:not(:first-child):hover { background-color: #ecf0f1; color: #2980b9; font-weight: bold; }
</style>
    </select>

    <br><br>
    <button class="btn" onclick="registrar('entrada')">Entrada</button>
    <button class="btn" onclick="registrar('almocoSaida')">Saída Almoço</button>
    <button class="btn" onclick="registrar('almocoRetorno')">Retorno Almoço</button>
    <button class="btn" onclick="registrar('saida')">Saída</button>

    <table>
        <thead>
            <tr><th>Dia</th><th>Entrada</th><th>S. Almoço</th><th>R. Almoço</th><th>Saída</th></tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>

    <script>
        const SENHA_EDICAO = "123456";

        setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);

        function registrar(tipo) {
            const hoje = new Date();
            const dataKey = hoje.toLocaleDateString();
            let pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            if (!pontos[dataKey]) pontos[dataKey] = { entrada: '-', almocoSaida: '-', almocoRetorno: '-', saida: '-' };
            pontos[dataKey][tipo] = hoje.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            localStorage.setItem('pontos2026', JSON.stringify(pontos));
            renderizarTabela();
        }

        function editarPonto(data, tipo) {
            const senha = prompt("Digite a senha para editar:");
            if (senha !== SENHA_EDICAO) { alert("Senha incorreta!"); return; }
            const novo = prompt("Novo horário (HH:MM):");
            if (novo) {
                let pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
                pontos[data][tipo] = novo;
                localStorage.setItem('pontos2026', JSON.stringify(pontos));
                renderizarTabela();
            }
        }

        function renderizarTabela() {
            const mes = parseInt(document.getElementById('mesSelect').value);
            const pontos = JSON.parse(localStorage.getItem('pontos2026') || '{}');
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            Object.keys(pontos).sort().forEach(data => {
                const d = data.split('/');
                if (parseInt(d[1]) - 1 === mes) {
                    const p = pontos[data];
                    corpo.innerHTML += `<tr><td>${d[0]}</td>
                        <td onclick="editarPonto('${data}','entrada')" style="cursor:pointer; color:blue;">${p.entrada}</td>
                        <td onclick="editarPonto('${data}','almocoSaida')" style="cursor:pointer; color:blue;">${p.almocoSaida}</td>
                        <td onclick="editarPonto('${data}','almocoRetorno')" style="cursor:pointer; color:blue;">${p.almocoRetorno}</td>
                        <td onclick="editarPonto('${data}','saida')" style="cursor:pointer; color:blue;">${p.saida}</td></tr>`;
                }
            });
        }

        document.getElementById('mesSelect').value = new Date().getMonth();
        renderizarTabela();
    </script>
</body>
</html>
